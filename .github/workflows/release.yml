name: Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: true
        type: string
        default: 'main'
      prerelease:
        description: 'Create as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Required to push tags, create releases, and commit to gh-pages branch

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Extract version from Chart.yaml
        id: version
        run: |
          VERSION=$(sed -n 's/^version: *//p' chart/Chart.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: v$VERSION"

      - name: Check if tag exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Log in to Quay.io
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push image
        run: |
          make images push
        env:
          TAG: v${{ steps.version.outputs.version }}

      # Tag must be pushed before chart-releaser runs because it scans remote tags
      # to match against Chart.yaml versions
      - name: Create and push tag
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Install Helm
        uses: azure/setup-helm@b7246b12e77f7134dc2d460a3d5bad15bbe29390 # v4.1.0
        with:
          version: v3.16.3

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.6.0
        with:
          charts_dir: .
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5d49f27b8ba0c6c92e8c6011a94 # v2.2.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Installation

            ### Helm Chart
            See [chart/README.md](https://github.com/stolostron/multicluster-mesh-addon/blob/v${{ steps.version.outputs.version }}/chart/README.md) for installation instructions.

            Quick install:
            ```bash
            helm repo add multicluster-mesh-addon https://stolostron.github.io/multicluster-mesh-addon
            helm repo update
            helm install multicluster-mesh-addon multicluster-mesh-addon/multicluster-mesh-addon \
              --version ${{ steps.version.outputs.version }} \
              --namespace multicluster-mesh-system \
              --create-namespace
            ```
