# Namespace-scoped permissions for controller-runtime leader election and event recording.
# This is static configuration, not generated from kubebuilder annotations.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: multicluster-mesh-controller
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
      - update
