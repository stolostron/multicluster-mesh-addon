image:
  repository: quay.io/sail-dev/multicluster-mesh-addon
  tag: latest
  # pullPolicy: Always is used for OpenShift (default).
  # For Kind, this is overridden to IfNotPresent via --set because images are
  # side-loaded into Kind via "kind load image-archive" and never pushed to a
  # registry. With "Always", the kubelet would try to pull from the registry
  # and fail with ErrImagePull.
  pullPolicy: Always

platform: openshift

ui:
  enabled: true
  image:
    repository: quay.io/sail-dev/ossm-acm-console-plugin
    tag: latest
    pullPolicy: Always
