---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: multiclustermeshes.mesh.open-cluster-management.io
spec:
  group: mesh.open-cluster-management.io
  names:
    kind: MultiClusterMesh
    listKind: MultiClusterMeshList
    plural: multiclustermeshes
    singular: multiclustermesh
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MultiClusterMesh represents a multi-cluster service mesh configuration
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MultiClusterMeshSpec defines the desired state of a multi-cluster
              mesh
            properties:
              clusterSet:
                description: ClusterSet references the ACM ManagedClusterSet that
                  defines cluster membership
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.clusterSet is immutable
                  rule: self == oldSelf
              controlPlane:
                description: ControlPlane defines the target configuration for the
                  mesh control plane
                properties:
                  namespace:
                    default: istio-system
                    description: Namespace is the namespace where Istio will be installed
                      on each cluster
                    type: string
                  templateSource:
                    description: |-
                      TemplateSource defines where the Istio CR template comes from.
                      If omitted, a built-in basic template is used (suitable for demos).
                    properties:
                      basic:
                        description: |-
                          Basic uses the controller's built-in Istio CR template with sensible
                          defaults (DNS proxy metadata enabled). Suitable for demos and quick starts.
                          This is also the behavior when templateSource is omitted entirely.
                        type: object
                      configMapRef:
                        description: |-
                          ConfigMapRef references a ConfigMap containing the Istio CR template YAML.
                          The ConfigMap must be in the same namespace as the MultiClusterMesh resource.
                        properties:
                          key:
                            default: istio.yaml
                            description: Key is the ConfigMap data key containing
                              the Istio CR YAML.
                            type: string
                          name:
                            description: Name is the ConfigMap name.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      git:
                        description: Git pulls the Istio CR template from a git repository.
                        properties:
                          path:
                            description: Path is the file path within the repository
                              to the Istio CR YAML.
                            minLength: 1
                            type: string
                          ref:
                            description: Ref specifies the git reference to resolve.
                              Defaults to branch "main".
                            properties:
                              branch:
                                description: Branch name to track.
                                type: string
                              commit:
                                description: Commit SHA to pin to.
                                type: string
                              tag:
                                description: Tag name to track.
                                type: string
                            type: object
                          secretRef:
                            description: |-
                              SecretRef references a Secret containing git credentials for private repos.
                              For HTTPS: username + password (or token). For SSH: ssh-privatekey + known_hosts.
                            properties:
                              name:
                                description: Name of the Secret.
                                minLength: 1
                                type: string
                            required:
                            - name
                            type: object
                          url:
                            description: URL is the git repository URL.
                            minLength: 1
                            type: string
                        required:
                        - path
                        - url
                        type: object
                      none:
                        description: |-
                          None signals the controller to skip mesh resource creation
                          (IstioCNI, Istio CR, gateway, remote secrets). Only foundational
                          plumbing is reconciled: operator install, MSA, and trust certs.
                          Use this when managing mesh resources externally (e.g. via ArgoCD).
                        type: object
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of basic, none, configMapRef, or git must
                        be set
                      rule: '(has(self.basic) ? 1 : 0) + (has(self.none) ? 1 : 0)
                        + (has(self.configMapRef) ? 1 : 0) + (has(self.git) ? 1 :
                        0) == 1'
                  version:
                    description: |-
                      Version pins the Istio control plane version (e.g. "v1.28.8").
                      If empty, the operator selects its default version.
                    type: string
                type: object
              gateway:
                description: Gateway defines the east-west gateway configuration
                properties:
                  serviceType:
                    default: LoadBalancer
                    description: |-
                      ServiceType is the Kubernetes Service type for the east-west gateway.
                      Use "NodePort" on clusters without a LoadBalancer controller (CRC, Kind, bare-metal).
                    enum:
                    - LoadBalancer
                    - NodePort
                    type: string
                type: object
              operator:
                description: Operator defines the service mesh operator installation
                  configuration
                properties:
                  channel:
                    default: stable
                    description: Channel is the OLM subscription channel (e.g., "stable",
                      "1.23")
                    type: string
                  installPlanApproval:
                    default: Automatic
                    description: InstallPlanApproval is the approval strategy (Automatic
                      or Manual)
                    enum:
                    - Automatic
                    - Manual
                    type: string
                  name:
                    default: servicemeshoperator3
                    description: Name is the OLM package name of the operator
                    type: string
                  namespace:
                    default: openshift-operators
                    description: Namespace is the namespace where the operator will
                      be installed
                    type: string
                  source:
                    default: redhat-operators
                    description: Source is the CatalogSource name
                    type: string
                  sourceNamespace:
                    default: openshift-marketplace
                    description: SourceNamespace is the namespace of the CatalogSource
                    type: string
                  startingCSV:
                    description: |-
                      StartingCSV is the specific operator version to install
                      Useful for testing or pinning to a specific version
                    type: string
                type: object
              security:
                description: Security defines the trust and discovery configuration
                properties:
                  discovery:
                    description: Discovery defines the endpoint discovery configuration
                    properties:
                      tokenValidity:
                        default: 360h
                        description: |-
                          TokenValidity defines how long discovery tokens are valid
                          Supports hours (h), minutes (m), seconds (s). If unset, defaults to 360h
                        type: string
                        x-kubernetes-validations:
                        - message: TokenValidity must be at least 10 minutes
                          rule: duration(self) >= duration('10m')
                    type: object
                  trust:
                    description: Trust defines the mTLS trust configuration
                    properties:
                      certManager:
                        description: CertManager defines the cert-manager issuer reference
                        properties:
                          issuerRef:
                            description: IssuerRef references the cert-manager Issuer
                              to use as Root CA
                            properties:
                              kind:
                                default: Issuer
                                description: Kind of the issuer (Issuer or ClusterIssuer)
                                enum:
                                - Issuer
                                - ClusterIssuer
                                type: string
                              name:
                                description: Name of the Issuer or ClusterIssuer
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - issuerRef
                        type: object
                    type: object
                type: object
              topology:
                description: Topology defines the mesh topology (MultiPrimary or PrimaryRemote)
                properties:
                  primaryCluster:
                    description: |-
                      PrimaryCluster is the name of the primary cluster for PrimaryRemote topology.
                      If empty and type is PrimaryRemote, defaults to the first cluster alphabetically.
                    type: string
                  type:
                    default: MultiPrimary
                    description: Type is the mesh topology
                    enum:
                    - MultiPrimary
                    - PrimaryRemote
                    type: string
                type: object
                x-kubernetes-validations:
                - message: primaryCluster must be empty for MultiPrimary topology
                  rule: self.type != 'MultiPrimary' || !has(self.primaryCluster) ||
                    size(self.primaryCluster) == 0
            required:
            - clusterSet
            type: object
          status:
            description: MultiClusterMeshStatus defines the observed state of MultiClusterMesh
            properties:
              clusterStatus:
                description: ClusterStatus tracks the status of each cluster in the
                  mesh
                items:
                  description: ClusterMeshStatus tracks the mesh status for a specific
                    cluster
                  properties:
                    clusterName:
                      description: ClusterName is the name of the managed cluster
                      type: string
                    conditions:
                      description: Conditions represent the latest available observations
                        of this cluster's state
                      items:
                        description: Condition contains details for one aspect of
                          the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: |-
                              lastTransitionTime is the last time the condition transitioned from one status to another.
                              This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: |-
                              message is a human readable message indicating details about the transition.
                              This may be an empty string.
                            maxLength: 32768
                            type: string
                          observedGeneration:
                            description: |-
                              observedGeneration represents the .metadata.generation that the condition was set based upon.
                              For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                              with respect to the current state of the instance.
                            format: int64
                            minimum: 0
                            type: integer
                          reason:
                            description: |-
                              reason contains a programmatic identifier indicating the reason for the condition's last transition.
                              Producers of specific condition types may define expected values and meanings for this field,
                              and whether the values are considered a guaranteed API.
                              The value should be a CamelCase string.
                              This field may not be empty.
                            maxLength: 1024
                            minLength: 1
                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                            type: string
                          status:
                            description: status of the condition, one of True, False,
                              Unknown.
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            maxLength: 316
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                  required:
                  - clusterName
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - clusterName
                x-kubernetes-list-type: map
              conditions:
                description: Conditions represent the latest available observations
                  of the mesh state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              primaryGatewayAddress:
                description: |-
                  PrimaryGatewayAddress is the LB address (IP or hostname) of the primary cluster's
                  east-west gateway for PrimaryRemote topology. Empty for MultiPrimary.
                  Populated by the controller for user observability; internal controller logic reads
                  the address live from ManifestWork feedback.
                type: string
            type: object
        type: object
        x-kubernetes-validations:
        - message: metadata.name must not exceed 63 characters
          rule: size(self.metadata.name) <= 63
    served: true
    storage: true
    subresources:
      status: {}
