# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# org level configuration: https://github.com/stolostron/coderabbit/blob/main/.coderabbit.yaml
inheritance: true
tone_instructions: Prefer concise responses (high information density, low fluff)
reviews:
  high_level_summary: false
  changed_files_summary: false
  review_status: false
  collapse_walkthrough: true
  path_instructions:
    - path: '**'
      instructions: >
        - Focus on major issues impacting performance, readability, maintainability and security. Avoid nitpicks and avoid verbosity.
        - Group similar issues into a single comment instead of posting multiple notes.
        - Skip repetition — if a pattern repeats, mention it once at a summary level only.
        - Do not post comments on code style, formatting, or non-critical improvements.
        - Before flagging a deviation from best practices, check if the PR follows an existing pattern in the codebase. If the same approach is used elsewhere in the repo, it's intentional, not a bug.
chat:
  auto_reply: false
