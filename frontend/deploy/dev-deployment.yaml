apiVersion: apps/v1
kind: Deployment
metadata:
  name: ossm-acm-plugin
  namespace: ossm-acm-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ossm-acm-plugin
  template:
    metadata:
      labels:
        app: ossm-acm-plugin
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 9443
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /plugin-manifest.json
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: dist
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: serving-cert
              mountPath: /var/serving-cert
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: dist
          configMap:
            name: ossm-acm-plugin-dist
        - name: nginx-conf
          configMap:
            name: ossm-acm-plugin-nginx
        - name: serving-cert
          secret:
            secretName: ossm-acm-plugin-tls
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ossm-acm-plugin
  namespace: ossm-acm-plugin
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: ossm-acm-plugin-tls
spec:
  selector:
    app: ossm-acm-plugin
  ports:
    - port: 9443
      targetPort: 9443
