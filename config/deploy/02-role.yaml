---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
      - update
