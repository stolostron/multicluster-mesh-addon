apiVersion: v1
kind: Namespace
metadata:
  name: multicluster-mesh-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: multicluster-mesh-controller
subjects:
- kind: ServiceAccount
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: multicluster-mesh-controller
rules:
- apiGroups:
  - mesh.open-cluster-management.io
  resources:
  - multiclustermeshes
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - mesh.open-cluster-management.io
  resources:
  - multiclustermeshes/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - mesh.open-cluster-management.io
  resources:
  - multiclustermeshes/finalizers
  verbs:
  - update
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclustersets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - work.open-cluster-management.io
  resources:
  - manifestworks
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: multicluster-mesh-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multicluster-mesh-controller
subjects:
- kind: ServiceAccount
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multicluster-mesh-controller
  namespace: multicluster-mesh-system
  labels:
    app: multicluster-mesh-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multicluster-mesh-controller
  template:
    metadata:
      labels:
        app: multicluster-mesh-controller
    spec:
      serviceAccountName: multicluster-mesh-controller
      containers:
      - name: controller
        image: quay.io/sail-dev/multicluster-mesh-addon:latest
        imagePullPolicy: Always
        command:
        - /multicluster-mesh-addon
        - controller
        args:
        - --metrics-addr=:8080
        - --health-probe-addr=:8081
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: tmp
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
