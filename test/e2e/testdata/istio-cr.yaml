apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: {{.CRName}}
spec:
  namespace: {{.CPNamespace}}
  values:
    meshConfig:
      trustDomain: {{.TrustDomain}}
      defaultConfig:
        proxyMetadata:
          ISTIO_META_DNS_CAPTURE: "true"
          ISTIO_META_DNS_AUTO_ALLOCATE: "true"
    global:
      meshID: {{.MeshID}}
      multiCluster:
        clusterName: {{.ClusterName}}
      network: {{.Network}}
