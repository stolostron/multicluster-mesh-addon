apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eastwestgateway
  namespace: {{.CPNamespace}}
  labels:
    topology.istio.io/network: "{{.Network}}"
spec:
  gatewayClassName: istio
  listeners:
  - name: cross-network
    hostname: "*.local"
    port: 15443
    protocol: TLS
    tls:
      mode: Passthrough
